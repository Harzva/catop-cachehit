<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-label="catop LiteLLM Proxy integration preview">
  <rect width="900" height="430" rx="12" fill="#0c0a09"/>
  <path d="M0 116 C180 80 270 138 444 104 C620 70 700 24 900 58 L900 0 L0 0 Z" fill="#0f766e" opacity="0.42"/>
  <rect x="30" y="34" width="840" height="360" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="1.4"/>
  <text x="58" y="78" fill="#fbbf24" font-family="Consolas, Menlo, monospace" font-size="17" font-weight="700">LiteLLM Proxy -> catop JSONL</text>
  <text x="58" y="116" fill="#e5e7eb" font-family="Consolas, Menlo, monospace" font-size="15">litellm_settings:</text>
  <text x="78" y="145" fill="#e5e7eb" font-family="Consolas, Menlo, monospace" font-size="15">callbacks: catop.litellm_proxy.proxy_handler_instance</text>
  <text x="58" y="188" fill="#9ca3af" font-family="Consolas, Menlo, monospace" font-size="14">CATOP_LITELLM_LOG=/var/log/catop/litellm-proxy-cachehit.jsonl</text>
  <rect x="58" y="220" width="330" height="116" rx="8" fill="#f6f0e7"/>
  <text x="82" y="254" fill="#111827" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="700">1. Proxy success callback</text>
  <text x="82" y="285" fill="#374151" font-family="Consolas, Menlo, monospace" font-size="14">usage + cost + metadata</text>
  <text x="82" y="314" fill="#0f766e" font-family="Consolas, Menlo, monospace" font-size="14">no prompt text persisted</text>
  <path d="M418 278 L482 278" stroke="#fbbf24" stroke-width="3"/>
  <path d="M470 266 L484 278 L470 290" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <rect x="512" y="220" width="300" height="116" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="536" y="254" fill="#111827" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="700">2. catop watches JSONL</text>
  <text x="536" y="285" fill="#374151" font-family="Consolas, Menlo, monospace" font-size="14">--window today</text>
  <text x="536" y="314" fill="#0f766e" font-family="Consolas, Menlo, monospace" font-size="14">--group-by session</text>
  <text x="58" y="372" fill="#d1d5db" font-family="Consolas, Menlo, monospace" font-size="15">catop --litellm-proxy-log --window today --top 10</text>
</svg>
