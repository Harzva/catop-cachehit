name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pyinstaller:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: catop-linux
            binary-path: ./dist/catop
          - os: windows-latest
            artifact-name: catop-windows
            binary-path: ./dist/catop.exe
          - os: macos-latest
            artifact-name: catop-macos
            binary-path: ./dist/catop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[package]"

      - name: Build one-file binary
        run: pyinstaller --clean --onefile --name catop src/catop/__main__.py

      - name: Smoke test binary
        run: ${{ matrix.binary-path }} --demo --once --top 3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary-path }}
          if-no-files-found: error
          retention-days: 14
